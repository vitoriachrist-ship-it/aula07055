<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">

    <title>Exemplo CSS e JS - FMP</title>
    <!-- Ligação do arquivo CSS externo -->

    <link rel="stylesheet" href="style.css">
</head>

<body>
     <!-- Título principal da página -->
    <h1>Aula de CSS e JavaScript</h1>

     <!-- Parágrafo explicativo -->
     <p id="texto">
    Este é um exemplo simples para entender CSS e JS.
     </p>

    <!-- Botão que será usado pelo JavaScript -->
    <button onclick="alterarTexto('O JavaScript alterou este texto')">
    Clique aqui
    </button>
   
    <button onclick="alterarTexto('Aprendendo principio JavaScript')">
    Saiba Mais
    </button>

    <!-- Ligação do arquivo JavaScript externo -->
    <script src="script.js"></script>

</body>
</html>
